<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AGRI Document Library v5.5</title><link rel="stylesheet" href="../assets/platform.css"><link rel="stylesheet" href="assets/documents.css"></head><body>
<header class="topbar"><a class="brand" href="../"><span class="logo">A</span><span><strong>AGRI Document Library v5.5</strong><small>Quản lý tài liệu kỹ thuật, biểu mẫu và hồ sơ</small></span></a><div class="top-actions"><button id="btn-import" class="button secondary">Nhập documents.json</button><button id="btn-export" class="button">Xuất documents.json</button><input id="import-file" type="file" accept=".json,application/json" hidden></div></header>
<main class="docs-layout"><aside class="docs-sidebar"><div class="panel-title">Danh mục tài liệu</div><button class="folder active" data-category="">📚 Tất cả</button><button class="folder" data-category="chan-nuoi">🐔 Chăn nuôi</button><button class="folder" data-category="trong-trot">🌱 Trồng trọt</button><button class="folder" data-category="thuy-san">🐟 Thủy sản</button><button class="folder" data-category="vietgap">📄 VietGAP</button><button class="folder" data-category="ocop">📦 OCOP</button><button class="folder" data-category="bieu-mau">📝 Biểu mẫu</button><a class="folder link" href="../">🏠 Dashboard</a></aside>
<section class="docs-main"><div class="page-head"><div><p class="eyebrow">DOCUMENT LIBRARY</p><h1>Kho tài liệu AGRI</h1><p class="lead">Quản lý tài liệu kỹ thuật, hồ sơ, biểu mẫu và tài liệu tham khảo.</p></div><button id="btn-new" class="button">+ Thêm tài liệu</button></div>
<div class="stats"><article><span id="stat-total">0</span><small>Tổng tài liệu</small></article><article><span id="stat-pdf">0</span><small>PDF</small></article><article><span id="stat-word">0</span><small>Word</small></article><article><span id="stat-excel">0</span><small>Excel</small></article><article><span id="stat-ppt">0</span><small>PowerPoint</small></article></div>
<div class="toolbar"><input id="search" placeholder="Tìm theo tên, mô tả, từ khóa hoặc đối tượng liên quan..."><select id="type-filter"><option value="">Tất cả định dạng</option><option value="pdf">PDF</option><option value="word">Word</option><option value="excel">Excel</option><option value="powerpoint">PowerPoint</option></select><select id="sort"><option value="name">Sắp xếp theo tên</option><option value="updated">Mới cập nhật</option><option value="type">Theo định dạng</option></select></div><div id="document-list" class="document-list"></div></section></main>
<dialog id="document-dialog"><form method="dialog" id="document-form"><div class="dialog-head"><strong id="dialog-title">Thêm tài liệu</strong><button value="cancel" class="dialog-close">×</button></div><div class="dialog-body"><input id="edit-index" type="hidden"><label class="field"><span>Tên tài liệu *</span><input id="name" required></label><label class="field"><span>Định dạng</span><select id="type"><option value="pdf">PDF</option><option value="word">Word</option><option value="excel">Excel</option><option value="powerpoint">PowerPoint</option></select></label><label class="field"><span>Danh mục</span><select id="category"><option value="chan-nuoi">Chăn nuôi</option><option value="trong-trot">Trồng trọt</option><option value="thuy-san">Thủy sản</option><option value="vietgap">VietGAP</option><option value="ocop">OCOP</option><option value="bieu-mau">Biểu mẫu</option></select></label><label class="field"><span>Đối tượng liên quan</span><input id="object-slug" placeholder="Ví dụ: ga-sao"></label><label class="field wide"><span>Đường dẫn tệp *</span><input id="path" placeholder="Ví dụ: documents/chan-nuoi/ga-sao/quy-trinh.pdf" required></label><label class="field wide"><span>Mô tả</span><textarea id="description" rows="4"></textarea></label><label class="field wide"><span>Từ khóa</span><input id="keywords" placeholder="gà sao, quy trình, VietGAP"></label><label class="check wide"><input id="featured" type="checkbox"><span>Đánh dấu tài liệu nổi bật</span></label></div><div class="dialog-actions"><button value="cancel" class="button secondary">Hủy</button><button id="btn-save" value="default" class="button">Lưu tài liệu</button></div></form></dialog>
<dialog id="preview-dialog"><div class="dialog-head"><strong>Xem trước tài liệu</strong><button id="close-preview" class="dialog-close">×</button></div><div id="preview-body" class="preview-body"></div></dialog>
<script src="assets/documents.js"></script></body></html>
